<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Unlisted work-in-progress area: keep out of search engines -->
<meta name="robots" content="noindex, nofollow">
<title>Work in Progress · PacePark AI Research</title>
<style>
:root{--accent:#ff6719;--serif:Georgia,"Iowan Old Style","Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);background:#ffffff;color:#1a1a1a;line-height:1.65}
.hero{max-width:720px;margin:0 auto;padding:90px 22px 40px;border-bottom:1px solid #e7e5e0}
.eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
h1{font-family:var(--serif);font-size:48px;font-weight:800;letter-spacing:-1px;margin:0 0 16px}
.subtitle{font-size:19px;color:#555;max-width:600px;line-height:1.6;margin:0}
.section{max-width:720px;margin:0 auto;padding:44px 22px}
.posts{list-style:none;margin:0;padding:0}
.post-item{padding:18px 0;border-bottom:1px solid #e7e5e0}
.post-item:first-child{padding-top:0}
.post-item:last-child{border-bottom:none}
.post-item .pdate{display:block;color:var(--accent);font-size:12.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.post-item a{font-family:var(--serif);font-size:21px;font-weight:700;color:#1a1a1a;text-decoration:none}
.post-item a:hover{color:var(--accent)}
.post-item p{margin:6px 0 0;color:#555;font-size:15px;line-height:1.55}
.empty{color:#8a8a8a;font-size:16px;font-style:italic}
.footer{text-align:center;color:#8a8a8a;padding:40px 22px;font-size:13px;border-top:1px solid #e7e5e0;max-width:720px;margin:0 auto}
.footer a{color:#8a8a8a}
@media(max-width:600px){h1{font-size:36px}}
</style>
</head>
<body>
<div class="hero">
<span class="eyebrow">Unlisted · Drafts</span>
<h1>Work in Progress</h1>
<p class="subtitle">
Drafts and experiments that aren't ready for the main blog yet. This page isn't linked from the homepage — reach it only via its direct URL.
</p>
</div>

<div class="section">
<ul class="posts">
<li class="post-item empty">No drafts published yet. Add new WIP pages to <code>/wip/</code> and list them here.</li>
</ul>
</div>

<div class="footer">© 2026 PacePark AI Research · <a href="/">Home</a></div>
